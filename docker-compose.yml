# Prompt Arena — 협동 보스 레이드 전체 스택 (Postgres + Redis + Backend + Frontend)
#
# 사용:
#   docker compose up -d --build       # 전체 빌드 + 기동
#   docker compose ps                  # 상태 확인
#   docker compose logs -f backend     # 백엔드 로그
#   docker compose logs -f frontend    # 프론트엔드 로그
#   docker compose down                # 정지 (볼륨 유지)
#   docker compose down -v             # 정지 + 데이터 삭제
#
# 접속:
#   - 프론트엔드(Streamlit): http://localhost:8501
#   - 백엔드(FastAPI):       http://localhost:8000  (/healthz, /api/tasks)

services:
  postgres:
    image: postgres:16-alpine
    container_name: prompt-arena-postgres
    environment:
      POSTGRES_DB: prompt_arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d prompt_arena"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: prompt-arena-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: prompt-arena-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://arena:arena_password@postgres:5432/prompt_arena
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 8s
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: prompt-arena-frontend
    ports:
      - "8501:8501"
    environment:
      # Streamlit 프로세스(서버사이드)가 백엔드 컨테이너로 REST/WS 호출
      - ARENA_BASE_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
